name: Screenshot Tabelle

on:
  schedule:
    - cron: '0 18 * * 0'

  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:

      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Playwright installieren
        run: |
          npm init -y
          npm install playwright

      - name: Screenshot erstellen
        run: node screenshot.js

      - name: Bild hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ligaportal-tabelle
          path: tabelle.png
